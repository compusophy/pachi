<body>

<header class="chrome top">
  <div class="logo-wrap">
    <button class="logo" id="logo" aria-haspopup="true" aria-expanded="false">PACHI</button>
    <div class="logo-menu" id="logoMenu" role="menu">
      <button class="logo-menu-item" data-action="claim"     role="menuitem">claim daily</button>
      <button class="logo-menu-item" data-action="analytics" role="menuitem">analytics</button>
      <button class="logo-menu-item" data-action="brandkit"  role="menuitem">brand kit</button>
    </div>
  </div>
  <div class="bal" id="bal">···</div>
  <div class="cog-wrap">
    <button class="cog" id="cog" aria-haspopup="true" aria-expanded="false" aria-label="settings">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <div class="cog-menu" id="cogMenu" role="menu">
      <div class="cog-addr-row">
        <span class="cog-addr" id="cogAddrText" title="">—</span>
        <button class="cog-copy" id="cogCopy" aria-label="copy address">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="9" y="9" width="11" height="11" rx="2"/>
            <path d="M5 15V5a2 2 0 0 1 2-2h10"/>
          </svg>
        </button>
      </div>
      <button class="cog-menu-item" data-action="import" role="menuitem">IMPORT</button>
      <button class="cog-menu-item" data-action="export" role="menuitem">EXPORT</button>
    </div>
  </div>
</header>

<main id="stage" class="stage"></main>

<footer class="chrome bottom">
  <div class="version" id="version">v—</div>
</footer>

<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 class="modal-title" id="modalTitle">analytics</h2>
      <button class="modal-close" id="modalClose" aria-label="close">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="modal stale" id="staleModal" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 class="modal-title">PACHI updated</h2>
    </div>
    <div class="modal-body">
      <p class="stale-copy">A new version of the contract is live. Refresh to load the latest client.</p>
      <p class="stale-versions">
        client&nbsp;<span id="staleClient">—</span>&nbsp;&nbsp;·&nbsp;&nbsp;
        latest&nbsp;v<span id="staleLatest">—</span>
      </p>
      <button class="stale-btn" id="staleRefresh">REFRESH</button>
    </div>
  </div>
</div>

<script type="module" src="./shell.js"></script>
</body>
</html>
